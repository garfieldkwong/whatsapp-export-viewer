version: '3.8'

services:
  whatsapp-export-viewer:
    image: whatsapp-export-viewer:latest
    container_name: whatsapp-export-viewer
    ports:
      - "443:3000"
    volumes:
      - /share/share/whatsapp_export/zips:/app/whatsapp-exports
      # Mount SSL certificates (uncomment to enable HTTPS)
      # - /path/to/ssl/cert.crt:/app/ssl/cert.crt:ro
      # - /path/to/ssl/key.key:/app/ssl/key.key:ro
    environment:
      - PORT=3000
      - WHATSAPP_EXPORTS_DIR=/app/whatsapp-exports
      - TEMP_DIR=/app/.temp
      - DB_PATH=/app/data/whatsapp.db
      - NODE_OPTIONS=--max-old-space-size=512
      - REINDEX_ON_STARTUP=true
      # SSL (uncomment and set paths to enable HTTPS)
      # - SSL_CERT_PATH=/app/ssl/cert.crt
      # - SSL_KEY_PATH=/app/ssl/key.key
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

volumes:
  whatsapp-exports:
  data:
